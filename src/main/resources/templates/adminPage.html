<html xmlns:th="https://www.thymeleaf.org">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
    }
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body class="text-white">

  <!-- Navbar -->
  <div class="glass flex items-center justify-between px-6 py-3">
    <div class="flex items-center gap-4">
      <a href="/" class="text-lg font-semibold tracking-wide hover:text-white/70 transition">FileVault</a>
      <span class="text-xs px-2 py-0.5 rounded-full bg-red-500/30 border border-red-400/40 text-red-300">Admin</span>
    </div>
    <div class="flex items-center gap-4">
      <span class="text-sm text-white/70" th:text="${username}"></span>
      <form method="POST" th:action="@{/logout}">
        <button type="submit"
          class="text-sm px-4 py-1.5 rounded-full border border-white/30 hover:bg-white/10 transition">
          Logout
        </button>
      </form>
    </div>
  </div>

  <div class="flex flex-col items-center px-4 py-16 gap-6">

    <!-- Flash message -->
    <div th:if="${message}"
      class="glass rounded-xl px-6 py-3 text-sm text-yellow-300 border-yellow-400/30 w-full max-w-2xl">
      <span th:text="${message}"></span>
    </div>

    <div class="w-full max-w-2xl">
      <h2 class="text-2xl font-semibold mb-6 text-white/90">Users</h2>

      <div th:if="${#lists.isEmpty(users)}" class="glass rounded-2xl p-8 text-center text-white/50">
        No users have uploaded files yet.
      </div>

      <div th:each="user : ${users}" class="glass rounded-2xl p-6 mb-4">
        <div class="flex items-center justify-between mb-4">
          <div>
            <p class="text-sm font-mono text-white/50" th:text="${user.owner}"></p>
            <p class="text-sm text-white/50 mt-1" th:text="${#lists.size(user.files)} + ' file(s)'"></p>
          </div>
          <form method="POST" th:action="@{/admin/delete-user}">
            <input type="hidden" name="owner" th:value="${user.owner}" />
            <button type="submit"
              class="px-4 py-1.5 rounded-full border border-red-400/40 text-red-400 hover:bg-red-500/20 text-sm transition">
              Delete user
            </button>
          </form>
        </div>
        <ul th:if="${not #lists.isEmpty(user.files)}" class="flex flex-col gap-1">
          <li th:each="file : ${user.files}" class="text-sm text-white/60 pl-2 border-l border-white/10"
            th:text="${file}"></li>
        </ul>
      </div>

    </div>
  </div>

</body>
</html>
