<html xmlns:th="https://www.thymeleaf.org">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" th:href="@{/styles.css}" />
</head>
<body class="text-white flex items-center justify-center min-h-screen">

  <div class="glass rounded-2xl p-8 w-full max-w-sm shadow-xl">
    <h2 class="text-xl font-semibold mb-6 text-white/90">Create account</h2>

    <div th:if="${error}" class="mb-4 px-4 py-2 rounded-lg bg-red-500/20 border border-red-400/40 text-red-300 text-sm"
      th:text="${error}"></div>

    <div th:if="${param.registered}" class="mb-4 px-4 py-2 rounded-lg bg-green-500/20 border border-green-400/40 text-green-300 text-sm">
      Account created — you can now log in.
    </div>

    <form method="POST" th:action="@{/register}" class="flex flex-col gap-4">
      <input type="text" name="username" placeholder="Username" required autocomplete="username"
        class="bg-white/10 border border-white/20 rounded-xl px-4 py-2 text-sm text-white placeholder-white/40 focus:outline-none focus:border-indigo-400" />
      <input type="password" name="password" placeholder="Password" required autocomplete="new-password"
        class="bg-white/10 border border-white/20 rounded-xl px-4 py-2 text-sm text-white placeholder-white/40 focus:outline-none focus:border-indigo-400" />
      <button type="submit"
        class="bg-indigo-500 hover:bg-indigo-600 text-white font-medium py-2 rounded-xl transition">
        Register
      </button>
    </form>

    <p class="mt-4 text-sm text-white/50 text-center">
      Already have an account?
      <a href="/login" class="text-indigo-300 hover:text-indigo-100 transition">Log in</a>
    </p>
  </div>

</body>
</html>
